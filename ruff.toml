line-length = 100
target-version = "py310"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = [
    "E501", "E701", "E702", "E722",
    "E741",
    "F403", "F405",
    "N813", "N818",
    "B904", "B905",
    "W291", "W292", "W293",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["N813"]