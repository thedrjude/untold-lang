name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Configure PyPI
        run: |
          echo -e "[pypi]\nusername = __token__\npassword = ${{ secrets.PYPI_TOKEN }}" > ~/.pypirc
          chmod 600 ~/.pypirc

      - name: Publish to PyPI
        run: twine upload dist/*

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "$VERSION" \
            --title "Untold Lang $VERSION" \
            --notes-file RELEASE_NOTES_v${VERSION#v}.md \
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}