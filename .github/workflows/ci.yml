name: Untold Lang CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run lexer tests
        run: python tests/test_lexer.py

      - name: Run parser tests
        run: python tests/test_parser.py

      - name: Run interpreter tests
        run: python tests/test_interpreter.py

      - name: Test CLI
        run: |
          untold version
          untold run tests/samples/hello.ut