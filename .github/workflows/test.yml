name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install
      run: |
        pip install pytest
        pip install -e .
    
    - name: Run tests
      run: |
        pytest tests/ -v || true
    
    - name: Run example
      run: |
        echo 'start main() { say("Hello!") }' > test.ut
        untold run test.ut