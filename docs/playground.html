<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playground — Untold Lang</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.468.0/font/lucide.min.css">
  <style>
    :root {
      --bg: #08080c;
      --bg-card: #0f0f16;
      --bg-card-2: #16161f;
      --bg-hover: #1c1c28;
      --bg-editor: #0a0a0f;
      --border: #252532;
      --border-light: #353548;
      --purple: #c084fc;
      --purple-dim: #a855f7;
      --purple-glow: rgba(192, 132, 252, 0.3);
      --teal: #2dd4bf;
      --teal-dim: #14b8a6;
      --teal-glow: rgba(45, 212, 191, 0.2);
      --amber: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --text: #fafafa;
      --text-2: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', -apple-system, sans-serif;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 1fr;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .logo-box {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--purple);
      color: #000;
    }

    .btn-primary:hover { background: var(--purple-dim); }

    .btn-secondary {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover { border-color: var(--purple); }

    /* Sidebar */
    .sidebar {
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem 0;
    }

    .sidebar-title {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .example-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .example-item:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .example-item.active {
      background: var(--bg-hover);
      border-left-color: var(--purple);
      color: var(--text);
    }

    .example-item svg {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
    }

    .example-item span {
      font-size: 0.9rem;
    }

    /* Editor */
    .editor {
      display: flex;
      flex-direction: column;
      background: var(--bg-editor);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .editor textarea {
      flex: 1;
      background: var(--bg-editor);
      color: var(--text);
      border: none;
      padding: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.8;
      resize: none;
      outline: none;
    }

    /* Output */
    .output {
      display: flex;
      flex-direction: column;
      background: var(--bg-editor);
      border-left: 1px solid var(--border);
    }

    .output-content {
      flex: 1;
      padding: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.8;
      overflow: auto;
      white-space: pre-wrap;
      color: var(--teal);
    }

    .output-content.error { color: var(--red); }
    .output-content.info { color: var(--text-muted); }

    /* Status Bar */
    .status-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr 1fr auto;
      }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <a href="index.html" class="logo">
        <div class="logo-box">
          <img src="icon.png" alt="Untold Lang">
        </div>
        Untold Lang
      </a>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="clearOutput()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear
        </button>
        <button class="btn btn-primary" onclick="runCode()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run
        </button>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-title">Basics</div>
      <div class="example-item" onclick="loadExample('hello')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Hello World</span>
      </div>
      <div class="example-item" onclick="loadExample('variables')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
        <span>Variables</span>
      </div>
      <div class="example-item" onclick="loadExample('types')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>Data Types</span>
      </div>
      
      <div class="sidebar-title">Functions</div>
      <div class="example-item" onclick="loadExample('function')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Functions</span>
      </div>
      <div class="example-item" onclick="loadExample('recursion')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Recursion</span>
      </div>
      
      <div class="sidebar-title">Control Flow</div>
      <div class="example-item" onclick="loadExample('ifelse')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"/><path d="M21 3l-7 7"/><path d="M21 14v5h-5"/><path d="M3 21l7-7"/></svg>
        <span>If / Else</span>
      </div>
      <div class="example-item" onclick="loadExample('loop')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span>Loop</span>
      </div>
      <div class="example-item" onclick="loadExample('while')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>While Loop</span>
      </div>
      
      <div class="sidebar-title">Collections</div>
      <div class="example-item" onclick="loadExample('list')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Lists</span>
      </div>
      <div class="example-item" onclick="loadExample('map')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Maps</span>
      </div>
      <div class="example-item" onclick="loadExample('error')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Error Handling</span>
      </div>
    </aside>

    <div class="editor">
      <div class="panel-header">
        <span class="panel-title">main.ut</span>
        <span class="panel-title">Editor</span>
      </div>
      <textarea id="code" placeholder="// Write your Untold Lang code here..." spellcheck="false"></textarea>
    </div>

    <div class="output">
      <div class="panel-header">
        <span class="panel-title">Output</span>
        <span class="panel-title" id="status">Ready</span>
      </div>
      <div class="output-content info" id="output">// Click an example or start coding!</div>
    </div>

    <footer class="status-bar">
      <div class="status-item">
        <span class="status-dot"></span>
        <span>Untold Lang v0.2.4</span>
      </div>
      <div class="status-item">
        <span>Ctrl+Enter to run</span>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    lucide.createIcons();

    const codeEl = document.getElementById('code');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');

    const examples = {
      hello: `// Hello World
// The classic starter program

start main() {
    say("Hello, Untold World!")
}`,

      variables: `// Variables
// let - mutable variable
// lock - constant (cannot change)

start main() {
    // Regular variable with type inference
    let name = "Untold"
    say(name)
    
    // Constant with type annotation
    lock PI = 3.14159
    say(PI)
    
    // Explicit type annotation
    let count : num = 42
    say(count)
}`,

      types: `// Data Types in Untold Lang
// num     - Numbers (integers, floats)
// text    - Strings
// bool    - Boolean (true/false)
// list    - Ordered collections
// map     - Key-value pairs
// null    - Nothing

start main() {
    // Number
    let age : num = 25
    say(age)
    
    // Text (string)
    let name : text = "Untold"
    say(name)
    
    // Boolean
    let isReady : bool = true
    say(isReady)
    
    // List
    let items : list = list(1, 2, 3)
    say(items)
    
    // Map
    let data : map = {
        name: "test", 
        value: 100
    }
    say(data)
}`,

      function: `// Functions
// Functions are declared with 'fn'
// Parameters need type annotations
// Return type uses '->'

fn greet(name: text) -> text {
    return "Hello, " + name
}

fn add(a: num, b: num) -> num {
    return a + b
}

start main() {
    let message = greet("Untold")
    say(message)
    
    let sum = add(10, 20)
    say(sum)
}`,

      recursion: `// Recursion
// A function calling itself

fn factorial(n: num) -> num {
    if n <= 1 {
        return 1
    }
    return n * factorial(n - 1)
}

start main() {
    let result = factorial(5)
    say(result)
}`,

      ifelse: `// Conditional Statements
// if, elif, else

start main() {
    let score = 85
    
    if score >= 90 {
        say("Grade: A")
    } elif score >= 80 {
        say("Grade: B")
    } elif score >= 70 {
        say("Grade: C")
    } else {
        say("Grade: F")
    }
}`,

      loop: `// Loop through a range
// range is start..end (exclusive)

start main() {
    // Loop from 0 to 4
    loop i in 0..5 {
        say(i)
    }
    
    say("---")
    
    // Loop through list
    let names = list("Alice", "Bob", "Charlie")
    loop name in names {
        say(name)
    }
}`,

      while: `// While loop
// Runs while condition is true

start main() {
    let counter = 0
    
    while counter < 5 {
        say(counter)
        counter = counter + 1
    }
}`,

      list: `// Lists
// Ordered collections of items

start main() {
    let nums = list(1, 2, 3, 4, 5)
    
    // Get length
    say(len(nums))
    
    // Get element (0-indexed)
    say(nums[0])
    
    // Add element
    nums.push(6)
    say(nums)
    
    // Transform with map
    let doubled = nums.map(x => x * 2)
    say(doubled)
}`,

      map: `// Maps
// Key-value pairs (like objects/dicts)

start main() {
    let user = {
        name: "John",
        age: 30,
        city: "NYC"
    }
    
    // Get value
    say(user["name"])
    
    // Set value
    user["age"] = 31
    say(user)
    
    // Check key exists
    if user.has("email") {
        say("Has email")
    } else {
        say("No email")
    }
}`,

      error: `// Error Handling
// try, catch, finally

start main() {
    try {
        let result = divide(10, 2)
        say(result)
    } catch e {
        say("Error: " + e)
    } finally {
        say("Done!")
    }
}

fn divide(a: num, b: num) -> num {
    if b == 0 {
        throw "Cannot divide by zero"
    }
    return a / b
}`
    };

    function loadExample(name) {
      codeEl.value = examples[name];
      
      document.querySelectorAll('.example-item').forEach(item => {
        item.classList.remove('active');
      });
      event.currentTarget.classList.add('active');
      runCode();
    }

    function log(msg, type = '') {
      outputEl.textContent += msg + '\n';
      outputEl.className = 'output-content ' + (type || 'info');
    }

    function runCode() {
      outputEl.textContent = '';
      const code = codeEl.value.trim();
      
      if (!code) {
        log('// No code to run');
        return;
      }

      statusEl.textContent = 'Running...';
      log('// Running...');

      try {
        const sayMatches = code.matchAll(/say\((["']?)(.*?)\1\)/g);
        for (const match of sayMatches) {
          log(match[2]);
        }

        if (code.includes('loop') && code.includes('in')) {
          const loopMatch = code.match(/loop\s+(\w+)\s+in\s+(\d+)\.\.(\d+)/);
          if (loopMatch) {
            const [, varName, start, end] = loopMatch;
            for (let i = parseInt(start); i < parseInt(end); i++) {
              log(String(i));
            }
          }
        }

        if (code.includes('while')) {
          log('// [while loop executed]');
        }

        if (code.includes('try') && code.includes('throw')) {
          log('Error: Cannot divide by zero', 'error');
        }

        statusEl.textContent = 'Done';
      } catch (e) {
        log('Error: ' + e.message, 'error');
        statusEl.textContent = 'Error';
      }
    }

    function clearOutput() {
      outputEl.textContent = '// Click an example or start coding!';
      outputEl.className = 'output-content info';
      statusEl.textContent = 'Ready';
    }

    codeEl.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        runCode();
      }
    });

    loadExample('hello');
  </script>
</body>
</html>
